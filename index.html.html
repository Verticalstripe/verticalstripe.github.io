<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Wylderose</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e8e0d0;
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.5rem 1rem;
  overflow-x: hidden;
}

.cover-wrapper {
  position: relative;
  width: min(420px, 88vw);
  margin-bottom: 1.5rem;
  cursor: pointer;
}

.arrow-hint {
  position: absolute;
  top: -2.8rem;
  right: -0.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
  animation: pulse 1.4s ease-in-out infinite;
  z-index: 10;
}
.arrow-hint span {
  font-family: Georgia, serif;
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #c8a96e;
  margin-bottom: 0.4rem;
}
.arrow-hint svg {
  width: 40px;
  height: 52px;
  transform: rotate(30deg);
}
@keyframes pulse {
  0%, 100% { opacity: 1;   transform: translateY(0); }
  50%       { opacity: 0.7; transform: translateY(4px); }
}

#stage {
  width: 100%;
  perspective: 1200px;
}
#book {
  width: 100%;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateY(0deg);
  transition: none;
}
.face {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
#front { transform: rotateY(0deg); }
#back  { transform: rotateY(180deg); }
.face img {
  width: 100%;
  display: block;
  box-shadow: 0 8px 40px rgba(0,0,0,0.8);
}
#book-height-ref {
  width: 100%;
  visibility: hidden;
  display: block;
}

h1 {
  font-size: 1rem;
  font-weight: normal;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #c8a96e;
  margin-bottom: 0.6rem;
  text-align: center;
}
p {
  font-size: 0.85rem;
  color: #888;
  letter-spacing: 0.1em;
  text-align: center;
  margin-bottom: 1.2rem;
}
a.buy {
  display: inline-block;
  border: 1px solid #c8a96e;
  color: #c8a96e;
  text-decoration: none;
  padding: 0.55rem 1.6rem;
  letter-spacing: 0.15em;
  font-size: 0.8rem;
  text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
}
a.buy:hover { background: #c8a96e; color: #0a0a0a; }
</style>
</head>
<body>

<audio id="bgMusic" src="japanese_garden.mp3" loop></audio>

<div class="cover-wrapper" id="coverWrap">
  <div class="arrow-hint" id="arrowHint">
    <span>Tap</span>
    <svg viewBox="0 0 52 68" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M26 4 L26 56 M26 56 L8 38 M26 56 L44 38"
            stroke="#c8a96e" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div id="stage">
    <div id="book">
      <div class="face" id="front">
        <img src="monstrous.jpg" alt="Monstrous – front cover">
      </div>
      <div class="face" id="back">
        <img src="monstrous_back.jpg" alt="Monstrous – back cover">
      </div>
      <img id="book-height-ref" src="monstrous.jpg" alt="">
    </div>
  </div>
</div>

<p>Available June 2nd 2026</p>
<a class="buy" href="#">Order on Amazon</a>

<script>
  const TURN_DURATION = 3000;

  const coverWrap = document.getElementById('coverWrap');
  const arrowHint = document.getElementById('arrowHint');
  const book      = document.getElementById('book');
  const music     = document.getElementById('bgMusic');

  music.volume = 0;
  let animating = false;
  let flipped = false;

  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function lerp(a, b, t) { return a + (b-a)*t; }

  function animate(duration, cb) {
    return new Promise(resolve => {
      const start = performance.now();
      function frame(now) {
        const t = Math.min((now - start) / duration, 1);
        cb(t);
        if (t < 1) requestAnimationFrame(frame);
        else resolve();
      }
      requestAnimationFrame(frame);
    });
  }

  function fadeMusic(targetVol, fadeDuration) {
    const steps = 30;
    const interval = fadeDuration / steps;
    const startVol = music.volume;
    let step = 0;
    return new Promise(resolve => {
      const id = setInterval(() => {
        step++;
        music.volume = Math.min(1, Math.max(0, lerp(startVol, targetVol, step / steps)));
        if (step >= steps) { clearInterval(id); resolve(); }
      }, interval);
    });
  }

  coverWrap.addEventListener('click', async () => {
    if (animating) return;
    animating = true;

    if (!flipped) {
      // First tap — front to back, start music
      arrowHint.style.display = 'none';
      music.play();
      fadeMusic(0.7, 3000);
      await animate(TURN_DURATION, t => {
        book.style.transform = `rotateY(${lerp(0, -180, easeInOut(t))}deg)`;
      });
      flipped = true;
    } else {
      // Subsequent taps — toggle back and forth
      const from = flipped ? -180 : 0;
      const to   = flipped ?    0 : -180;
      if (flipped) fadeMusic(0.3, 1000); else fadeMusic(0.7, 1000);
      await animate(TURN_DURATION, t => {
        book.style.transform = `rotateY(${lerp(from, to, easeInOut(t))}deg)`;
      });
      flipped = !flipped;
      if (!flipped) arrowHint.style.display = 'flex';
    }

    animating = false;
  });
</script>
</body>
</html>
