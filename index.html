<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Wylderose</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e8e0d0;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .cover {
    max-width: 500px;
    width: 100%;
    margin-bottom: 2rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8);
  }
  .cover img {
    width: 100%;
    display: block;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: normal;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #c8a96e;
    margin-bottom: 0.75rem;
    text-align: center;
  }
  p {
    font-size: 0.95rem;
    color: #888;
    letter-spacing: 0.1em;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  a.buy {
    display: inline-block;
    border: 1px solid #c8a96e;
    color: #c8a96e;
    text-decoration: none;
    padding: 0.6rem 1.8rem;
    letter-spacing: 0.15em;
    font-size: 0.85rem;
    text-transform: uppercase;
    transition: background 0.2s, color 0.2s;
  }
  a.buy:hover {
    background: #c8a96e;
    color: #0a0a0a;
  }
</style>
</head>
<body>
  <div class="cover">
    <!-- Replace the src below with your actual Monstrous JPG filename -->
    <img src="monstrous.jpg" alt="Monstrous by Harry Wylderose">
  </div>
  <h1>Harry Wylderose</h1>
  <p>Available May 4th 2026</p>
  <!-- Replace the href with your actual Amazon/KDP product URL -->
  <a class="buy" href="#">Order on Amazon</a>
</body>
</html>
